[config]
default_to_workspace = false

[env]
DATABASE_URL = "sqlite:${CARGO_MAKE_WORKING_DIRECTORY}/backend/deploydodo.db"

[tasks.backend]
description = "Run the backend server"
command = "cargo"
args = ["run", "-p", "backend"]

[tasks.frontend]
description = "Run the frontend development server"
command = "npm"
args = ["run", "dev"]
cwd = "frontend"

[tasks.add-migration]
description = "Add a new database migration"
command = "sqlx"
args = ["migrate", "add", "-s", "-r", "${@}"]
cwd = "backend"

[tasks.undo-migration]
description = "Revert the last database migration"
command = "sqlx"
args = ["migrate", "revert"]
cwd = "backend"

[tasks.migrate]
description = "Run database migrations"
command = "sqlx"
args = ["migrate", "run"]
cwd = "backend"

[tasks.generate-schema]
description = "Start the backend, wait for it to be ready, generate the frontend API schema, then stop the backend"
script = '''
cargo run -p backend &
BACKEND_PID=$!

echo "Waiting for backend..."
until curl -sf http://localhost:3000/api/health > /dev/null; do
  sleep 0.5
done

npm run generate:api --prefix frontend
EXIT_CODE=$?

kill $BACKEND_PID
exit $EXIT_CODE
'''

[tasks.dev]
description = "Run backend and frontend concurrently"
dependencies = ["generate-schema"]
run_task = { name = ["backend", "frontend"], parallel = true }
